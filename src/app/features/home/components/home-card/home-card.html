<div class="card" [style.borderLeftColor]="cardColor">
    <div class="card-icon-wrap" [style.background]="cardColor + '18'">
        <span class="card-icon" [style.color]="cardColor" [innerHTML]="safeIcon"></span>
    </div>
    <div class="card-info">
        <span class="card-value">{{ body }}</span>
        <span class="card-title">{{ title }}</span>
    </div>
</div>
