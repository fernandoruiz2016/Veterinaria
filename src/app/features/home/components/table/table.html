<div class="table-container">
    <table class="tabla">
        <thead>
            <tr>
                <th>Hora</th>
                <th>Mascota</th>
                <th>Veterinario</th>
                <th>Fecha</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            @for (cita of citas; track cita.id_cita) {
            <tr>
                <td>{{ cita.hora }}</td>
                <td>{{ cita.mascota }}</td>
                <td>{{ cita.veterinario }}</td>
                <td>{{ cita.fecha }}</td>
                <td>
                    <span class="badge"
                        [class.badge-programada]="cita.estado === 'Programada'"
                        [class.badge-atendida]="cita.estado === 'Atendida'"
                        [class.badge-cancelada]="cita.estado === 'Cancelada'"
                        [class.badge-no-asistio]="cita.estado === 'No asistió'">
                        {{ cita.estado }}
                    </span>
                </td>
            </tr>
            } @empty {
            <tr class="empty-row">
                <td colspan="5">Sin citas para mostrar</td>
            </tr>
            }
        </tbody>
    </table>
</div>
