<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="login-badge">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
          <path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 3a1 1 0 0 1 1 1v2h2a1 1 0 0 1 0 2h-2v2a1 1 0 0 1-2 0v-2H9a1 1 0 0 1 0-2h2V7a1 1 0 0 1 1-1z"/>
        </svg>
        Clínica Veterinaria
      </div>
      <h1>Iniciar sesión</h1>
      <p>Accede al panel de la clínica para gestionar citas, mascotas y dueños.</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input
          id="usuario"
          name="usuario"
          type="text"
          [(ngModel)]="usuario"
          placeholder="Ej: admin"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      @if (error) {
        <div class="login-error">
          {{ error }}
        </div>
      }

      <button type="submit" class="btn-login">
        Entrar
      </button>
    </form>
  </div>
</div>
