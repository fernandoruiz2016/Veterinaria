<div class="form-container">
    <h2>Editar Mascota</h2>

    <form (ngSubmit)="actualizarMascota()" #editForm="ngForm">
        <div class="row">
            <div class="form-group">
                <label>Nombre de la Mascota</label>
                <input type="text" name="nombre" [(ngModel)]="mascota.nombre" placeholder="Ej. Bobby" required />
            </div>

            <div class="form-group">
                <label>Dueño / Responsable</label>
                <input type="text" name="dueno" [(ngModel)]="mascota.dueno" placeholder="Nombre del dueño" required />
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Teléfono de Contacto</label>
                <input type="tel" name="telefono" [(ngModel)]="mascota.telefono" placeholder="Ej. 987654321" required />
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" [(ngModel)]="mascota.email" placeholder="correo@ejemplo.com" required
                    email />
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn-cancel" routerLink="/mascotas">Cancelar</button>
            <button type="submit" class="btn-save" [disabled]="!editForm.valid">Guardar Cambios</button>
        </div>
    </form>
</div>
