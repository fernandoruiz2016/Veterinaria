<div class="mascotas-container">
    <div class="subtitle">
        <h2>Gestión de Mascotas</h2>
        <a routerLink="crear" routerLinkActive="active">+ Crear mascota</a>
    </div>

    <div class="filter-wrapper">
        <h3>Buscar por:</h3>
        <form class="filter-form" (ngSubmit)="onFiltrar()">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="mascota" [(ngModel)]="filtros.nombre" placeholder="Nombre de la mascota" />
            </div>

            <div class="form-group">
                <label>Dueño</label>
                <input type="text" name="mascota" [(ngModel)]="filtros.dueno" placeholder="Dueño de la mascota" />
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" name="mascota" [(ngModel)]="filtros.telefono" placeholder="Teléfono del dueño" />
            </div>

            <button type="submit" class="btn-submit">Filtrar</button>
        </form>
    </div>

    <div class="table-container">
        <table class="tabla">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Dueño</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (mascota of mascotas; track mascota.id_mascota) {
                <tr>
                    <td>{{ mascota.nombre }}</td>
                    <td>{{ mascota.dueno }}</td>
                    <td>{{ mascota.telefono }}</td>
                    <td>{{ mascota.email }}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-historial" [routerLink]="['editar', mascota.id_mascota]">
                                Ver Historial
                            </button>
                            <button class="btn-edit" [routerLink]="['editar', mascota.id_mascota]">
                                Editar
                            </button>
                            <button class="btn-delete" (click)="eliminarMascota(mascota.id_mascota)">
                                Eliminar
                            </button>
                        </div>
                    </td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="5" style="text-align: center;">No se encontraron mascotas</td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
