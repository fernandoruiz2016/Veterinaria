<div class="form-container">
    <h2>Editar Dueño</h2>

    <form (ngSubmit)="actualizarDueno()" #editForm="ngForm">
        <div class="row">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" [(ngModel)]="dueno.nombre" placeholder="Ej. Juan Perez" required />
            </div>

            <div class="form-group">
                <label>Teléfono de Contacto</label>
                <input type="tel" name="telefono" [(ngModel)]="dueno.telefono" placeholder="Ej. 987654321" required />
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" [(ngModel)]="dueno.email" placeholder="correo@ejemplo.com" required
                    email />
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" name="direccion" [(ngModel)]="dueno.direccion" placeholder="Dirección completa"
                    required />
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn-cancel" routerLink="/duenos">Cancelar</button>
            <button type="submit" class="btn-save" [disabled]="!editForm.valid">Guardar Cambios</button>
        </div>
    </form>
</div>
