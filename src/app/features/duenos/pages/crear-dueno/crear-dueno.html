<div class="form-container">
    <h2>Registrar Nuevo Dueño</h2>

    <form (ngSubmit)="guardarDueno()" #duenoForm="ngForm">
        <div class="row">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" [(ngModel)]="nuevoDueno.nombre" placeholder="Ej. Juan Perez" required />
            </div>

            <div class="form-group">
                <label>Teléfono de Contacto</label>
                <input type="tel" name="telefono" [(ngModel)]="nuevoDueno.telefono" placeholder="Ej. 987654321"
                    required />
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" [(ngModel)]="nuevoDueno.email" placeholder="correo@ejemplo.com"
                    required email />
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" name="direccion" [(ngModel)]="nuevoDueno.direccion" placeholder="Dirección completa"
                    required />
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn-cancel" routerLink="/duenos">Cancelar</button>
            <button type="submit" class="btn-save" [disabled]="!duenoForm.valid">Guardar Dueño</button>
        </div>
    </form>
</div>
